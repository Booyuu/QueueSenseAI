name: Patch chat message formatting

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/patch-chat-format.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Patch chat message rendering
        run: |
          python3 <<'PY'
          from pathlib import Path

          index_path = Path("index.html")
          content = index_path.read_text(encoding="utf-8")

          old_function = '''            function appendMessage(text, isUser = true) {
                const msgDiv = document.createElement('div');
                msgDiv.className = isUser ? "flex justify-end mt-4 animate-[fadeIn_0.3s_ease-out]" : "flex justify-start mt-4 animate-[fadeIn_0.3s_ease-out]";
                
                const bubbleStr = isUser 
                    ? `<div class="bg-blue-600/90 text-white px-4 py-2.5 rounded-[18px] rounded-br-sm shadow-sm max-w-[80%]">${text}</div>`
                    : `<div class="bg-white/10 border border-white/10 text-white px-5 py-4 rounded-[18px] rounded-bl-sm shadow-sm max-w-[90%] backdrop-blur-md">
                           <p class="text-white/90">${text}</p>
                       </div>`;
                
                msgDiv.innerHTML = bubbleStr;
                chatMessages.appendChild(msgDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
'''

          new_function = '''            function appendMessage(text, isUser = true) {
                const msgDiv = document.createElement('div');
                msgDiv.className = isUser
                    ? "flex justify-end mt-4 animate-[fadeIn_0.3s_ease-out]"
                    : "flex justify-start mt-4 animate-[fadeIn_0.3s_ease-out]";

                const bubble = document.createElement('div');
                const safeText = String(text || '');

                if (isUser) {
                    bubble.className = "bg-blue-600/90 text-white px-4 py-2.5 rounded-[18px] rounded-br-sm shadow-sm max-w-[80%] whitespace-pre-line leading-relaxed";
                } else {
                    bubble.className = "bg-white/10 border border-white/10 text-white px-5 py-4 rounded-[18px] rounded-bl-sm shadow-sm max-w-[90%] backdrop-blur-md whitespace-pre-line leading-relaxed";
                }

                bubble.textContent = safeText;
                msgDiv.appendChild(bubble);
                chatMessages.appendChild(msgDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
'''

          if old_function in content:
              content = content.replace(old_function, new_function)
          else:
              content = content.replace(
                  '<p class="text-white/90">${text}</p>',
                  '<p class="text-white/90 whitespace-pre-line leading-relaxed">${text}</p>'
              )

          workflow_path = Path(".github/workflows/patch-chat-format.yml")
          if workflow_path.exists():
              workflow_path.unlink()

          index_path.write_text(content, encoding="utf-8")
          PY

      - name: Commit patch
        run: |
          git config user.name "QueueSense Patch Bot"
          git config user.email "actions@github.com"
          git add index.html .github/workflows/patch-chat-format.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Fix chat message formatting"
            git push
          fi
